<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>博客管理</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #111110;
    --surface: #1a1a18;
    --border: #2d2d2a;
    --text: #e8e6e3;
    --text-secondary: #8b8a86;
    --text-muted: #5c5b58;
    --accent: #a09080;
  }

  body {
    font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
    min-height: 100vh;
  }

  /* ===== 布局 ===== */
  .page-wrapper {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    gap: 48px;
    min-height: calc(100vh - 56px);
  }

  /* ===== 左侧栏 ===== */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    padding-top: 48px;
    position: sticky;
    top: 80px;
    align-self: flex-start;
    max-height: calc(100vh - 120px);
    overflow-y: auto;
  }

  .sidebar-section {
    padding-bottom: 24px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-section:last-child { border-bottom: none; }

  .section-title {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  /* 头像 */
  .avatar-wrapper {
    position: relative;
    width: 80px;
    height: 80px;
    margin: 0 auto 12px;
    cursor: pointer;
    border-radius: 50%;
    overflow: hidden;
    transition: opacity 0.2s;
  }
  .avatar-wrapper:hover { opacity: 0.85; }
  .avatar-wrapper:hover .avatar-overlay { opacity: 1; }
  .avatar-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .avatar-placeholder {
    width: 100%;
    height: 100%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    color: var(--text-muted);
  }
  .avatar-overlay {
    position: absolute;
    inset: 0;
    background: rgba(41, 37, 36, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: 50%;
    font-size: 12px;
    color: #fff;
    letter-spacing: 1px;
  }

  .profile-name {
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
    text-align: center;
    cursor: pointer;
    padding: 2px 8px;
    display: inline-block;
    width: 100%;
  }
  .profile-name:hover { background: var(--surface); border-radius: 2px; }

  .profile-bio {
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    cursor: pointer;
    padding: 2px 8px;
    display: inline-block;
    width: 100%;
  }
  .profile-bio:hover { background: var(--surface); border-radius: 2px; }

  /* 文章列表 */
  .post-nav-item {
    padding: 8px 0;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .post-nav-item:hover { color: var(--text); }
  .post-nav-item.active { color: var(--text); font-weight: 500; }
  .post-nav-item .nav-date { font-size: 11px; color: var(--accent); margin-right: 8px; flex-shrink: 0; }
  .post-nav-item .nav-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .post-nav-item .nav-cat { margin-left: 4px; font-size: 11px; }

  .btn-export {
    display: block;
    width: 100%;
    padding: 10px 0;
    margin-top: 16px;
    background: var(--text);
    color: var(--bg);
    border: none;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 1px;
    border-radius: 2px;
    transition: background 0.2s;
  }
  .btn-export:hover { background: #c4c0bb; }

  /* ===== 右侧主内容 ===== */
  .main-content {
    flex: 1;
    min-width: 0;
    padding-top: 48px;
    padding-bottom: 120px;
  }

  /* 表单 */
  .form-group { margin-bottom: 24px; }
  .form-group label {
    display: block; font-size: 13px;
    color: var(--text-muted); margin-bottom: 8px; letter-spacing: 1px;
  }
  .category-selector { display: flex; gap: 12px; flex-wrap: wrap; }
  .category-option {
    display: flex; align-items: center; gap: 6px;
    cursor: pointer; padding: 8px 16px;
    border: 1px solid var(--border); border-radius: 4px;
    font-size: 14px; color: var(--text-secondary);
    transition: all 0.2s;
  }
  .category-option:hover { border-color: var(--text-muted); }
  .category-option:has(input:checked) {
    border-color: var(--text); color: var(--text); background: var(--surface);
  }
  .category-option input[type="radio"] { display: none; }
  .form-group input[type="text"],
  .form-group input[type="date"],
  .form-group textarea {
    width: 100%; border: none;
    border-bottom: 1px solid var(--border);
    background: transparent; font-family: inherit;
    font-size: 16px; color: var(--text);
    padding: 8px 0; outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus,
  .form-group textarea:focus { border-bottom-color: var(--text-muted); }
  .form-group textarea {
    min-height: 320px;
    resize: vertical;
    line-height: 1.8;
  }

  /* 工具栏 */
  .editor-toolbar {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .toolbar-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 12px; font-size: 13px; font-family: inherit;
    color: var(--text-secondary); background: var(--surface);
    border: none; border-radius: 2px; cursor: pointer; transition: all 0.2s;
  }
  .toolbar-btn:hover { color: var(--text); background: var(--border); }

  .image-previews { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .image-preview-item {
    position: relative; width: 80px; height: 80px;
    border-radius: 2px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .image-preview-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .image-preview-item .remove-img {
    position: absolute;
    top: 2px; right: 2px;
    width: 18px; height: 18px;
    background: rgba(41, 37, 36, 0.7);
    color: #fafaf9;
    border: none;
    border-radius: 50%;
    font-size: 11px;
    line-height: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .image-preview-item .remove-img:hover { background: rgba(185, 28, 28, 0.8); }

  .form-actions { display: flex; gap: 16px; align-items: center; margin-top: 32px; }
  .btn-primary {
    padding: 10px 24px; background: var(--text); color: var(--bg);
    border: none; font-family: inherit; font-size: 14px;
    cursor: pointer; letter-spacing: 1px; transition: background 0.2s;
  }
  .btn-primary:hover { background: #c4c0bb; }
  .btn-secondary {
    padding: 10px 24px; background: transparent; color: var(--text-secondary);
    border: 1px solid var(--border); font-family: inherit;
    font-size: 14px; cursor: pointer; transition: all 0.2s;
  }
  .btn-secondary:hover { color: var(--text); border-color: var(--text-muted); }
  .btn-cancel {
    font-size: 14px; color: var(--text-muted); background: none;
    border: none; cursor: pointer; font-family: inherit;
  }
  .btn-cancel:hover { color: var(--text); }
  .btn-danger {
    font-size: 14px; color: #f87171; background: none;
    border: none; cursor: pointer; font-family: inherit; opacity: 0.6;
  }
  .btn-danger:hover { opacity: 1; }

  .export-hint {
    margin-top: 12px; font-size: 12px; color: var(--text-muted); line-height: 1.6;
  }

  /* 响应式 */
  @media (max-width: 768px) {
    .page-wrapper { flex-direction: column; gap: 0; }
    .sidebar {
      width: 100%;
      position: static;
      max-height: none;
      overflow-y: visible;
      padding-top: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid #e7e5e4;
    }
    .main-content { padding-top: 24px; padding-bottom: 80px; }
  }
</style>
</head>
<body>

<div class="page-wrapper">

  <!-- 左侧栏 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section" style="text-align:center">
      <div class="avatar-wrapper" onclick="handleAvatarUpload()" title="点击更换头像">
        <div id="avatar-display"></div>
        <div class="avatar-overlay">更换</div>
      </div>
      <div class="profile-name" onclick="editProfileName()" title="点击编辑昵称" id="profile-name"></div>
      <div class="profile-bio" onclick="editProfileBio()" title="点击编辑简介" id="profile-bio"></div>
    </div>

    <div class="sidebar-section">
      <div class="section-title">所有文章 <a onclick="router.navigate('new')" style="font-size:12px;color:#a8a29e;cursor:pointer;float:right;letter-spacing:0;">+ 新建</a></div>
      <div id="post-nav-list"></div>
    </div>

    <button class="btn-export" onclick="handlePublish()">⬆ 发布</button>
    <div class="export-hint" id="publish-status">
      编辑文章和个人信息后，点「发布」直接更新公网。
    </div>
  </aside>

  <!-- 右侧主编辑区 -->
  <main class="main-content" id="app"></main>

</div>

<script>
// ==================== 用户信息 ====================
const UserStore = {
  key: 'my_blog_user',
  get() {
    try { return JSON.parse(localStorage.getItem(this.key)) || {}; }
    catch { return {}; }
  },
  set(data) {
    const current = this.get();
    const updated = { ...current, ...data };
    localStorage.setItem(this.key, JSON.stringify(updated));
  },
  getAvatar() { return this.get().avatar || ''; },
  getName() { return this.get().name || '未命名'; },
  getBio() { return this.get().bio || '写一句简介…'; }
};

// ==================== 图片管理 ====================
const IMG_MARKER = /\{\{img:([^}]+)\}\}/g;
const IMG_FILE_MARKER = /\{\{img-file:([^}]+)\}\}/g;
let pendingImages = []; // 文件名列表（新格式）或 base64 数据（旧格式）

function extractImages(content) {
  const images = [];
  // 新格式 {{img-file:filename.jpg}}
  let match;
  const regex1 = new RegExp(IMG_FILE_MARKER.source, 'g');
  while ((match = regex1.exec(content)) !== null) {
    images.push('file:' + match[1]);
  }
  // 旧格式 {{img:base64data}}
  const regex2 = new RegExp(IMG_MARKER.source, 'g');
  while ((match = regex2.exec(content)) !== null) {
    images.push('data:' + match[1]);
  }
  return images;
}

// ==================== 数据层 (localStorage) ====================
const Storage = {
  key: 'my_blog_posts',
  getAll() {
    try {
      const posts = JSON.parse(localStorage.getItem(this.key) || '[]');
      return posts.map(p => ({ category: 'life', ...p })); // 旧文章默认生活
    }
    catch { return []; }
  },
  save(posts) { localStorage.setItem(this.key, JSON.stringify(posts)); },
  getById(id) { return this.getAll().find(p => p.id === id) || null; },
  add(post) {
    const posts = this.getAll();
    posts.unshift(post);
    this.save(posts);
  },
  update(id, data) {
    const posts = this.getAll();
    const idx = posts.findIndex(p => p.id === id);
    if (idx === -1) return false;
    posts[idx] = { ...posts[idx], ...data, updatedAt: new Date().toISOString() };
    this.save(posts);
    return true;
  },
  delete(id) {
    const posts = this.getAll().filter(p => p.id !== id);
    this.save(posts);
  }
};

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function formatDateShort(iso) {
  const d = new Date(iso);
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${m}/${day}`;
}

// ==================== 导出 ====================
async function handlePublish() {
  const btn = document.querySelector('.btn-export');
  const status = document.getElementById('publish-status');

  btn.textContent = '⏳ 发布中...';
  btn.disabled = true;
  status.textContent = '正在部署到公网...';

  const posts = Storage.getAll().map(p => ({
    id: p.id,
    title: p.title,
    content: p.content,
    category: p.category || 'life',
    createdAt: p.createdAt,
    updatedAt: p.updatedAt
  }));

  const profile = {
    name: UserStore.getName(),
    bio: UserStore.getBio(),
    avatar: UserStore.getAvatar()
  };

  try {
    const res = await fetch('http://localhost:3456/api/deploy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ posts, profile })
    });
    const result = await res.json();

    if (result.ok) {
      btn.textContent = '✅ 已发布';
      status.innerHTML = `公网已更新！<br><a href="${result.url}" target="_blank" style="color:#78716c;">${result.url}</a>`;
    } else {
      btn.textContent = '⬆ 发布';
      status.textContent = '发布失败：' + result.msg;
    }
  } catch (e) {
    btn.textContent = '⬆ 发布';
    status.textContent = '无法连接服务器，请先运行「启动编辑器.bat」';
  }

  btn.disabled = false;
  setTimeout(() => { if (btn.textContent === '✅ 已发布') btn.textContent = '⬆ 发布'; }, 3000);
}

// ==================== 头像和个人信息 ====================
function handleAvatarUpload() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = function() {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 512 * 1024) { alert('头像请控制在 500KB 以内'); return; }
    const reader = new FileReader();
    reader.onload = function() {
      UserStore.set({ avatar: reader.result });
      renderSidebar();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function editProfileName() {
  const current = UserStore.getName();
  const name = prompt('输入你的昵称：', current === '未命名' ? '' : current);
  if (name !== null) {
    UserStore.set({ name: name.trim() || '未命名' });
    renderSidebar();
  }
}

function editProfileBio() {
  const current = UserStore.getBio();
  const bio = prompt('写一句简介：', current === '写一句简介…' ? '' : current);
  if (bio !== null) {
    UserStore.set({ bio: bio.trim() || '写一句简介…' });
    renderSidebar();
  }
}

// ==================== 图片上传 ====================
async function handleImageUpload() {
  // 先记住光标位置（选文件前），防止失焦后位置丢失
  const textarea = document.getElementById('post-content');
  const savedPos = textarea ? textarea.selectionStart : 0;

  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.multiple = true;
  input.onchange = async function() {
    for (const file of Array.from(input.files)) {
      if (file.size > 100 * 1024 * 1024) {
        alert(`图片「${file.name}」超过 100MB，已跳过。`);
        continue;
      }
      try {
        const res = await fetch('http://localhost:3456/api/upload-image', {
          method: 'POST',
          headers: { 'X-Filename': encodeURIComponent(file.name) },
          body: file,
        });
        const result = await res.json();
        if (result.ok) {
          // 用保存的光标位置插入标记，标记后加换行方便写文字
          const marker = `{{img-file:${result.filename}}}\n`;
          pendingImages.push('file:' + result.filename);
          insertMarkerAt(marker, savedPos);
          renderImagePreviews();
        } else {
          alert('图片上传失败：' + result.msg);
        }
      } catch (e) {
        alert('无法连接服务器，请确认已运行启动编辑器.bat');
        return;
      }
    }
  };
  input.click();
}

async function handleVideoUpload() {
  const textarea = document.getElementById('post-content');
  const savedPos = textarea ? textarea.selectionStart : 0;

  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'video/*';
  input.onchange = async function() {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 500 * 1024 * 1024) {
      alert('视频超过 500MB，请先压缩或裁剪后再试。');
      return;
    }

    const statusEl = document.getElementById('publish-status');
    if (statusEl) statusEl.textContent = '正在上传视频...';

    try {
      const res = await fetch('http://localhost:3456/api/upload-video', {
        method: 'POST',
        headers: { 'X-Filename': encodeURIComponent(file.name) },
        body: file,
      });
      const result = await res.json();

      if (result.ok) {
        const marker = `{{video:${result.filename}}}\n`;
        insertMarkerAt(marker, savedPos);
        if (statusEl) statusEl.textContent = '视频已添加：' + result.filename;
      } else {
        if (statusEl) statusEl.textContent = '上传失败：' + result.msg;
        alert('上传失败：' + result.msg);
      }
    } catch (e) {
      if (statusEl) statusEl.textContent = '无法连接服务器';
      alert('无法连接服务器，请确认已运行启动编辑器.bat');
    }
  };
  input.click();
}

function insertMarkerAt(marker, pos) {
  const textarea = document.getElementById('post-content');
  if (!textarea) return;
  // 恢复焦点
  textarea.focus();
  const start = pos != null ? pos : textarea.selectionStart;
  const text = textarea.value;
  textarea.value = text.slice(0, start) + marker + text.slice(start);
  // 光标放到标记后面，方便继续打字
  const newPos = start + marker.length;
  textarea.selectionStart = textarea.selectionEnd = newPos;
}

function removePendingImage(index) {
  const removed = pendingImages[index];
  pendingImages.splice(index, 1);
  const textarea = document.getElementById('post-content');
  if (!textarea || !removed) return;
  if (removed.startsWith('file:')) {
    const filename = removed.slice(5);
    textarea.value = textarea.value.replace(`{{img-file:${filename}}}`, '');
  } else if (removed.startsWith('data:')) {
    const data = removed.slice(5);
    textarea.value = textarea.value.replace(`{{img:${data}}}`, '');
  }
  renderImagePreviews();
}

function renderImagePreviews() {
  const container = document.getElementById('image-previews');
  if (!container) return;
  if (pendingImages.length === 0) { container.innerHTML = ''; return; }
  container.innerHTML = pendingImages.map((img, i) => {
    let src;
    if (img.startsWith('file:')) {
      src = 'http://localhost:3456/images/' + img.slice(5);
    } else if (img.startsWith('data:')) {
      src = img.slice(5);
    } else {
      src = img;
    }
    return `
      <div class="image-preview-item">
        <img src="${escapeAttr(src)}" alt="图片 ${i + 1}">
        <button class="remove-img" onclick="removePendingImage(${i})" title="移除">×</button>
      </div>`;
  }).join('');
}

// ==================== 侧栏 ====================
function renderSidebar() {
  // 头像
  const avatarContainer = document.getElementById('avatar-display');
  const avatar = UserStore.getAvatar();
  if (avatarContainer) {
    avatarContainer.innerHTML = avatar
      ? `<img src="${escapeAttr(avatar)}" alt="头像">`
      : '<div class="avatar-placeholder">👤</div>';
  }

  // 昵称 & 简介
  const nameEl = document.getElementById('profile-name');
  const bioEl = document.getElementById('profile-bio');
  if (nameEl) nameEl.textContent = UserStore.getName();
  if (bioEl) bioEl.textContent = UserStore.getBio();

  // 文章导航
  renderPostNav();
}

function renderPostNav() {
  const container = document.getElementById('post-nav-list');
  if (!container) return;
  const posts = Storage.getAll();

  if (posts.length === 0) {
    container.innerHTML = '<div style="font-size:13px;color:#d6d3d1;">暂无文章</div>';
    return;
  }

  container.innerHTML = posts.map(p => `
    <div class="post-nav-item" data-id="${p.id}" onclick="router.navigate('edit', '${p.id}')">
      <span class="nav-date">${formatDateShort(p.createdAt)}</span>
      <span class="nav-title">${escapeHtml(p.title || '无标题')}<span class="nav-cat">${p.category === 'travel' ? '🗺' : p.category === 'patch' ? '📌' : p.category === 'thought' ? '💭' : p.category === 'reading' ? '📖' : '📝'}</span></span>
    </div>
  `).join('');
}

function setNavActive(id) {
  document.querySelectorAll('.post-nav-item').forEach(el => el.classList.remove('active'));
  if (id) {
    const active = document.querySelector(`.post-nav-item[data-id="${id}"]`);
    if (active) active.classList.add('active');
  }
}

// ==================== 视图 ====================
const views = {
  new() {
    pendingImages = [];
    setNavActive(null);
    return `
      <form onsubmit="handleCreate(event)">
        <div class="form-group">
          <label>日期</label>
          <input type="date" id="post-date" value="${today()}">
        </div>
        <div class="form-group">
          <label>分类</label>
          <div class="category-selector">
            <label class="category-option">
              <input type="radio" name="post-category" value="life" checked>
              <span>📝 生活</span>
            </label>
            <label class="category-option">
              <input type="radio" name="post-category" value="travel">
              <span>🗺️ 旅行</span>
            </label>
            <label class="category-option">
              <input type="radio" name="post-category" value="reading">
              <span>📖 阅读</span>
            </label>
            <label class="category-option">
              <input type="radio" name="post-category" value="thought">
              <span>💭 随想</span>
            </label>
            <label class="category-option">
              <input type="radio" name="post-category" value="patch">
              <span>📌 补丁</span>
            </label>
          </div>
        </div>
        <div class="form-group">
          <label>标题</label>
          <input type="text" id="post-title" placeholder="今天发生了什么…" autofocus>
        </div>
        <div class="form-group">
          <label>内容</label>
          <div class="editor-toolbar">
            <button type="button" class="toolbar-btn" onclick="handleImageUpload()">
              🖼 图片
            </button>
          </div>
          <div class="image-previews" id="image-previews"></div>
          <textarea id="post-content" placeholder="写下来就不会忘记…"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">保存</button>
          <button type="button" class="btn-cancel" onclick="router.navigate('new')">清空</button>
        </div>
      </form>`;
  },

  edit(id) {
    const post = Storage.getById(id);
    if (!post) {
      return `<div style="text-align:center;padding:80px 0;color:#a8a29e;">
        <p>文章不存在</p>
        <p style="font-size:14px;color:#d6d3d1;cursor:pointer;margin-top:8px;" onclick="router.navigate('new')">写一篇新的</p>
      </div>`;
    }
    pendingImages = extractImages(post.content);
    setNavActive(id);

    return `
      <form onsubmit="handleUpdate(event, '${post.id}')">
        <div class="form-group">
          <label>日期</label>
          <input type="date" id="post-date" value="${post.createdAt.slice(0,10)}">
        </div>
        <div class="form-group">
          <label>分类</label>
          <div class="category-selector">
            <label class="category-option">
              <input type="radio" name="post-category" value="life"${!post.category || post.category === 'life' ? ' checked' : ''}>
              <span>📝 生活</span>
            </label>
            <label class="category-option">
              <input type="radio" name="post-category" value="travel"${post.category === 'travel' ? ' checked' : ''}>
              <span>🗺️ 旅行</span>
            </label>
            <label class="category-option">
              <input type="radio" name="post-category" value="reading"${post.category === 'reading' ? ' checked' : ''}>
              <span>📖 阅读</span>
            </label>
            <label class="category-option">
              <input type="radio" name="post-category" value="thought"${post.category === 'thought' ? ' checked' : ''}>
              <span>💭 随想</span>
            </label>
            <label class="category-option">
              <input type="radio" name="post-category" value="patch"${post.category === 'patch' ? ' checked' : ''}>
              <span>📌 补丁</span>
            </label>
          </div>
        </div>
        <div class="form-group">
          <label>标题</label>
          <input type="text" id="post-title" value="${escapeAttr(post.title || '')}" autofocus>
        </div>
        <div class="form-group">
          <label>内容</label>
          <div class="editor-toolbar">
            <button type="button" class="toolbar-btn" onclick="handleImageUpload()">
              🖼 图片
            </button>
          </div>
          <div class="image-previews" id="image-previews"></div>
          <textarea id="post-content">${escapeHtml(post.content)}</textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">更新</button>
          <button type="button" class="btn-secondary" onclick="router.navigate('new')">写新的</button>
          <button type="button" class="btn-danger" onclick="handleDelete('${post.id}')">删除</button>
        </div>
      </form>`;
  }
};

// ==================== 路由 ====================
const router = {
  navigate(view, param) {
    const app = document.getElementById('app');
    if (!app) return;

    if (view === 'new') app.innerHTML = views.new();
    else if (view === 'edit') app.innerHTML = views.edit(param);
    else app.innerHTML = views.new();

    window.scrollTo(0, 0);

    // 图片预览
    if (view === 'edit' || view === 'new') {
      renderImagePreviews();
    }
  }
};

// ==================== 操作 ====================
function today() {
  return new Date().toISOString().slice(0, 10);
}

function handleCreate(e) {
  e.preventDefault();
  const dateVal = document.getElementById('post-date').value;
  const category = document.querySelector('input[name="post-category"]:checked')?.value || 'life';
  const title = document.getElementById('post-title').value.trim();
  const content = document.getElementById('post-content').value.trim();
  if (!content) return;

  const createdAt = dateVal
    ? new Date(dateVal + 'T12:00:00+08:00').toISOString()
    : new Date().toISOString();

  const id = genId();
  Storage.add({ id, title, content, category, createdAt, updatedAt: createdAt });
  pendingImages = [];
  renderSidebar();
  router.navigate('edit', id);
}

function handleUpdate(e, id) {
  e.preventDefault();
  const dateVal = document.getElementById('post-date').value;
  const category = document.querySelector('input[name="post-category"]:checked')?.value || 'life';
  const title = document.getElementById('post-title').value.trim();
  const content = document.getElementById('post-content').value.trim();
  if (!content) return;

  const createdAt = dateVal
    ? new Date(dateVal + 'T12:00:00+08:00').toISOString()
    : undefined;

  Storage.update(id, { title, content, category, ...(createdAt && { createdAt }) });
  pendingImages = [];
  renderSidebar();
  // 停留在当前页面
}

function handleDelete(id) {
  if (!confirm('确定删除这篇记录吗？')) return;
  Storage.delete(id);
  renderSidebar();
  router.navigate('new');
}

// ==================== 工具函数 ====================
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function escapeAttr(str) {
  return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ==================== 启动时尝试从服务器同步 ====================
async function init() {
  // 本地数据优先，服务器数据仅在没有本地数据时使用
  let needSync = Storage.getAll().length === 0;
  if (needSync) {
    try {
      const res = await fetch('http://localhost:3456/posts.json');
      if (res.ok) {
        const serverPosts = await res.json();
        if (serverPosts.length > 0) Storage.save(serverPosts);
      }
    } catch(e) {}
  }
  // 个人信息同步（本地为空时从服务器加载）
  if (!UserStore.get().name || UserStore.get().name === '未命名') {
    try {
      const res = await fetch('http://localhost:3456/profile.json');
      if (res.ok) {
        const profile = await res.json();
        if (profile.name && profile.name !== '未命名') UserStore.set(profile);
      }
    } catch(e) {}
  }
  renderSidebar();
  router.navigate('new');
}

init();
</script>
