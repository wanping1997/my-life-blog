<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行 · 自驾方案</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #171717;
    --surface: #1a1a18;
    --border: #2d2d2a;
    --text: #e8e6e3;
    --text-secondary: #8b8a86;
    --text-muted: #5c5b58;
    --accent: #a09080;
  }

  body {
    font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
    min-height: 100vh;
  }

  /* ===== 导航栏 ===== */
  .navbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(23, 23, 23, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .navbar-inner {
    max-width: 960px; margin: 0 auto; padding: 0 24px;
    height: 56px; display: flex; align-items: center; justify-content: space-between;
  }
  .navbar-brand {
    font-size: 18px; font-weight: 500; letter-spacing: 2px;
    color: var(--text); text-decoration: none;
  }
  .navbar-links a {
    font-size: 14px; color: var(--text-secondary); text-decoration: none;
    letter-spacing: 1px; transition: color 0.2s; margin-left: 28px;
  }
  .navbar-links a:hover { color: var(--text); }
  .navbar-links a.active { color: var(--text); font-weight: 500; }

  .page {
    max-width: 960px; margin: 0 auto; padding: 48px 24px 120px;
    min-height: calc(100vh - 56px);
  }

  .page-header { text-align: center; margin-bottom: 56px; }
  .page-header h1 { font-size: 28px; font-weight: 500; letter-spacing: 2px; margin-bottom: 8px; }
  .page-header p { font-size: 14px; color: var(--text-muted); }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }

  .plan-card {
    background: #183A32;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid #183A32;
    transition: border-color 0.2s, transform 0.15s;
  }
  .plan-card:hover {
    border-color: #fff;
    transform: translateY(-2px);
  }
  .card-accent { height: 3px; }
  .card-body { padding: 24px 24px 20px; }
  .card-body h3 { font-size: 17px; font-weight: 500; margin-bottom: 4px; letter-spacing: 1px; color: #fff; }
  .card-body .card-subtitle { font-size: 13px; color: rgba(255,255,255,0.75); margin-bottom: 12px; }
  .card-body .card-route {
    font-size: 13px; color: rgba(255,255,255,0.85); line-height: 1.6;
    margin-bottom: 14px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-meta {
    display: flex; gap: 16px; font-size: 12px; color: rgba(255,255,255,0.65);
    padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.25); flex-wrap: wrap;
  }
  .card-meta span { white-space: nowrap; }

  .detail-back {
    display: inline-block; font-size: 14px; color: var(--text-muted);
    cursor: pointer; margin-bottom: 32px; transition: color 0.2s; text-decoration: none;
  }
  .detail-back:hover { color: var(--text); }

  .detail-header { margin-bottom: 40px; }
  .detail-header .detail-accent { width: 40px; height: 3px; border-radius: 2px; margin-bottom: 16px; }
  .detail-header h1 { font-size: 26px; font-weight: 500; letter-spacing: 1px; margin-bottom: 6px; }
  .detail-header .detail-subtitle { font-size: 15px; color: var(--text-secondary); }

  .detail-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 16px; margin-bottom: 36px; padding: 20px;
    background: var(--surface); border-radius: 6px;
    border: 1px solid var(--border);
  }
  .stat-item { text-align: center; }
  .stat-value { font-size: 22px; font-weight: 500; color: var(--text); }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .detail-route {
    margin-bottom: 36px; padding: 20px;
    background: var(--surface); border-radius: 6px;
    border: 1px solid var(--border);
  }
  .detail-route h3 { font-size: 13px; color: var(--text-muted); letter-spacing: 2px; margin-bottom: 10px; }
  .detail-route p { font-size: 14px; color: #c4c0bb; line-height: 1.8; }

  .detail-desc { font-size: 15px; color: #c4c0bb; line-height: 2; margin-bottom: 36px; }
  .detail-desc p { margin-bottom: 1em; }

  .itin-table {
    width: 100%; border-collapse: collapse;
    font-size: 14px; line-height: 1.6; margin-bottom: 36px;
    background: #414445; border-radius: 4px; overflow: hidden;
  }
  .itin-table thead { border-bottom: 2px solid #555858; }
  .itin-table th {
    text-align: left; padding: 10px 10px;
    font-size: 12px; color: #a0a5a5; letter-spacing: 2px; font-weight: 500;
    border-right: 1px solid #555858;
  }
  .itin-table th:last-child { border-right: none; }
  .itin-table td {
    padding: 12px 10px; vertical-align: top;
    border-bottom: 1px solid #555858;
    border-right: 1px solid #555858;
    color: #d0d4d4;
  }
  .itin-table td:last-child { border-right: none; }
  .itin-table tr:hover td { background: rgba(255,255,255,0.06); }
  .itin-table .itin-day { font-weight: 500; color: #e8e6e3; white-space: nowrap; font-size: 13px; }
  .itin-table .itin-sub { font-size: 12px; color: #8a8e8e; }
  .itin-highlight td { background: #4a3a30; border-left: 3px solid #e8913a; }
  .itin-highlight:hover td { background: #554438; }
  .itin-highlight .itin-day { color: #ffb088; }

  .detail-actions { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 24px; border-radius: 6px; font-size: 14px;
    font-family: inherit; cursor: pointer; text-decoration: none;
    transition: all 0.2s; border: none;
  }
  .btn-primary { background: var(--text); color: var(--bg); }
  .btn-primary:hover { background: #c4c0bb; }
  .btn-outline {
    background: transparent; color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .btn-outline:hover { border-color: var(--text-muted); color: var(--text); }

  .empty-state { text-align: center; padding: 80px 0; color: var(--text-muted); font-size: 15px; }

  footer {
    max-width: 960px; margin: 0 auto; padding: 0 24px 40px;
    font-size: 12px; color: var(--text-muted); text-align: center;
  }

  @media (max-width: 768px) {
    .page { padding: 32px 16px 80px; }
    .page-header h1 { font-size: 22px; }
    .card-grid { grid-template-columns: 1fr; }
    .detail-stats { grid-template-columns: repeat(2, 1fr); }
    .detail-header h1 { font-size: 20px; }
  }
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-brand" href="index.html">首页</a>
    <div class="navbar-links">
      <a href="index.html">首页</a>
      <a href="travel.html" class="active">旅行</a>
    </div>
  </div>
</nav>

<div class="page" id="app"></div>

<footer>静静记录，无需多言</footer>

<script>
let plans = [];

async function loadPlans() {
  try {
    const res = await fetch('travel-plans.json?v=3');
    if (res.ok) plans = await res.json();
  } catch(e) { plans = []; }
}

function esc(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// ========== 视图 ==========

function renderList() {
  if (plans.length === 0) {
    return `<div class="empty-state">还没有旅行方案<br><span style="font-size:13px;color:#d6d3d1;">添加计划后这里会出现卡片</span></div>`;
  }

  const cards = plans.map(p => `
    <div class="plan-card" onclick="showDetail('${p.id}')">
      <div class="card-accent" style="background:${p.color || '#78716c'}"></div>
      <div class="card-body">
        <h3>${esc(p.title)}</h3>
        <div class="card-subtitle">${esc(p.subtitle || '')}</div>
        <div class="card-route">${esc(p.route)}</div>
        <div class="card-meta">
          <span>📅 ${esc(p.dates)}</span>
          <span>🚗 ${esc(p.distance)}</span>
          <span>⭐ ${esc(p.highlight)}</span>
        </div>
      </div>
    </div>`).join('');

  return `
    <div class="page-header">
      <h1>🗺️ 旅行计划</h1>
    </div>
    <div class="card-grid">${cards}</div>`;
}

function renderDetail(id) {
  const p = plans.find(x => x.id === id);
  if (!p) {
    return `<div class="empty-state">方案不存在<br><br><a class="detail-back" onclick="showList()">← 返回列表</a></div>`;
  }

  const stats = [
    { v: p.days + '天', l: '行程天数' },
    { v: p.distance, l: '驾驶里程' },
    { v: p.maxAltitude || '—', l: '最高海拔' },
    { v: p.type || '自驾', l: '出行方式' },
  ];

  return `
    <a class="detail-back" onclick="showList()">← 返回列表</a>
    <div class="detail-header">
      <div class="detail-accent" style="background:${p.color || '#78716c'}"></div>
      <h1>${esc(p.title)}</h1>
      <div class="detail-subtitle">${esc(p.subtitle || '')} · ${esc(p.dates)}</div>
    </div>
    <div class="detail-stats">
      ${stats.map(s => `
        <div class="stat-item">
          <div class="stat-value">${esc(s.v)}</div>
          <div class="stat-label">${s.l}</div>
        </div>`).join('')}
    </div>
    <div class="detail-route">
      <h3>🗺️ 路线</h3>
      <p>${esc(p.route)}</p>
    </div>
    <div class="detail-desc">
      ${p.description.split('\n').filter(Boolean).map(line => `<p>${esc(line)}</p>`).join('')}
    </div>
    ${p.itinerary ? p.itinerary : ''}
    <div class="detail-actions">
      <a href="${p.mapFile}" class="btn btn-primary" target="_blank">🗺️ 打开路线图</a>
      <a class="btn btn-outline" onclick="showList()">← 返回列表</a>
    </div>`;
}

function showList() {
  document.getElementById('app').innerHTML = renderList();
  window.scrollTo(0, 0);
}
function showDetail(id) {
  document.getElementById('app').innerHTML = renderDetail(id);
  window.scrollTo(0, 0);
}

async function init() {
  await loadPlans();
  showList();
}
init();
</script>

</body>
</html>
