<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生活记录</title>
<link rel="preload" href="avatar.webp" as="image" type="image/webp">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #171717;
    --surface: #1e1e1e;
    --border: #2d2d2a;
    --text: #e8e6e3;
    --text-secondary: #8b8a86;
    --text-muted: #5c5b58;
    --accent: #a09080;
  }

  body {
    font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
    min-height: 100vh;
  }

  /* ===== 导航栏 ===== */
  .navbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(23, 23, 23, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .navbar-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .navbar-brand {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 2px;
    color: var(--text);
    cursor: pointer;
    text-decoration: none;
  }
  .navbar-links a {
    font-size: 14px;
    color: var(--text-secondary);
    text-decoration: none;
    cursor: pointer;
    letter-spacing: 1px;
    transition: color 0.2s;
  }
  .navbar-links a:hover { color: var(--text); }

  /* ===== 布局 ===== */
  .page-wrapper {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    gap: 48px;
    min-height: calc(100vh - 56px - 80px);
  }

  /* ===== 左侧栏 ===== */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    padding-top: 48px;
    position: sticky;
    top: 80px;
    align-self: flex-start;
    max-height: calc(100vh - 120px);
    overflow-y: auto;
  }

  .profile {
    text-align: center;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }

  .avatar-wrapper {
    width: 80px;
    height: 80px;
    margin: 0 auto 16px;
    border-radius: 50%;
    overflow: hidden;
  }
  .avatar-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .avatar-placeholder {
    width: 100%;
    height: 100%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    color: var(--text-muted);
  }

  .profile-name {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
  }
  .profile-bio {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .archive-list { list-style: none; }
  @media (max-width: 768px) {
    .archive-list.mobile-hidden { display: none; }
  }

  .archive-item {
    padding: 10px 0;
    cursor: pointer;
    transition: color 0.2s;
    color: var(--text-secondary);
  }
  .archive-item:hover { color: var(--text); }
  .archive-item .archive-date {
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 1px;
  }
  .archive-item .archive-item-title {
    font-size: 14px;
    line-height: 1.4;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .archive-item.active .archive-item-title {
    color: var(--text);
    font-weight: 500;
  }
  .archive-empty {
    font-size: 13px;
    color: var(--text-muted);
  }

  /* ===== 右侧主内容 ===== */
  .main-content {
    flex: 1;
    min-width: 0;
    padding-top: 48px;
    padding-bottom: 120px;
  }

  .post-list { list-style: none; }
  .section-header {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .sub-nav-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 20px;
    border: 1px solid var(--border);
    border-radius: 4px;
    text-decoration: none;
    margin-bottom: 24px;
    transition: all 0.2s;
    color: var(--text);
  }
  .sub-nav-card:hover {
    border-color: var(--accent);
    background: var(--surface);
  }
  .sub-nav-icon { font-size: 20px; }
  .sub-nav-label {
    font-size: 15px;
    font-weight: 500;
    flex: 1;
  }
  .sub-nav-arrow {
    font-size: 14px;
    color: var(--accent);
  }
  .post-item {
    padding: 28px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .post-item:first-child { padding-top: 0; }
  .post-item .post-date {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .post-item .post-title {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .post-item .post-excerpt {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .post-item .has-image {
    display: inline-block;
    margin-left: 6px;
    font-size: 12px;
    color: var(--accent);
  }

  .empty-state {
    text-align: center;
    padding: 80px 0;
    color: var(--text-muted);
    font-size: 16px;
  }

  /* ===== 入口卡片 ===== */
  .portal-cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .portal-card {
    display: block;
    padding: 36px 32px;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.25s;
    background: var(--bg);
  }
  .portal-card:hover {
    border-color: var(--text-muted);
    background: var(--surface);
  }
  .portal-card .card-label {
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }
  .portal-card .card-desc {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  /* ===== 文章详情 ===== */
  .article-header { margin-bottom: 48px; }
  .article-header .post-date {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .article-header .post-title {
    font-size: 28px;
    font-weight: 500;
    line-height: 1.4;
  }
  .article-body {
    font-size: 16px;
    line-height: 2;
    color: #c4c0bb;
    word-wrap: break-word;
  }
  .article-body p { margin-bottom: 1.2em; }
  .article-body img {
    display: block;
    max-width: 50%;
    height: auto;
    margin: 24px auto;
    border-radius: 2px;
    cursor: zoom-in;
    transition: opacity 0.4s ease;
  }
  .article-body img:hover { opacity: 0.8; }

  /* ===== 图片灯箱 ===== */
  .lightbox-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.94);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.25s ease, visibility 0.25s ease;
  }
  .lightbox-overlay.active { opacity: 1; visibility: visible; }
  .lightbox-img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    border-radius: 2px;
    transition: opacity 0.2s ease;
  }
  .lightbox-close {
    position: fixed;
    top: 20px; right: 28px;
    background: none; border: none;
    color: #fff; font-size: 32px;
    cursor: pointer; z-index: 10001;
    opacity: 0.5; transition: opacity 0.2s;
    line-height: 1; padding: 8px;
  }
  .lightbox-close:hover { opacity: 1; }
  .lightbox-nav {
    position: fixed;
    top: 50%; transform: translateY(-50%);
    background: none; border: none;
    color: #fff; font-size: 48px;
    cursor: pointer; z-index: 10001;
    opacity: 0.3; transition: opacity 0.2s;
    padding: 16px 12px; line-height: 1;
  }
  .lightbox-nav:hover { opacity: 0.85; }
  .lightbox-prev { left: 8px; }
  .lightbox-next { right: 8px; }

  @media (max-width: 768px) {
    .article-body img { max-width: 80%; }
    .lightbox-nav { font-size: 36px; padding: 12px 8px; }
    .lightbox-close { font-size: 26px; top: 12px; right: 16px; }
    .lightbox-img { max-width: 95vw; max-height: 85vh; }
  }

  .embed-map {
    width: 100%; height: 480px;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin: 24px 0;
  }
  .back-link {
    display: inline-block;
    margin-top: 60px;
    font-size: 14px;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--text); }

  /* ===== 页脚 ===== */
  footer {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px 40px;
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
  }

  /* ===== 手机端顶部栏 ===== */
  .mobile-topbar {
    display: none;
  }
  .mobile-archive {
    display: none;
  }

  /* ===== 响应式 ===== */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .page-wrapper { flex-direction: column; gap: 0; }

    .mobile-topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
    }
    .mtb-avatar {
      width: 36px; height: 36px; border-radius: 50%; overflow: hidden;
      flex-shrink: 0;
    }
    .mtb-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .mtb-avatar .avatar-placeholder {
      width: 100%; height: 100%; background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--text-muted);
    }
    .mtb-name {
      flex: 1; font-size: 15px; font-weight: 500; color: var(--text);
    }
    .mtb-archive-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-secondary); font-size: 16px;
      padding: 4px 12px; border-radius: 4px; cursor: pointer;
      font-family: inherit;
    }

    /* 手机端文章下拉 */
    .mobile-archive {
      display: none;
      border-bottom: 1px solid var(--border);
      padding: 8px 20px 16px;
      max-height: 50vh; overflow-y: auto;
    }
    .mobile-archive.open { display: block; }
    .mobile-archive .ma-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0; cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 13px; color: var(--text-secondary);
    }
    .mobile-archive .ma-item:hover { color: var(--text); }
    .mobile-archive .ma-date {
      font-size: 11px; color: var(--accent); flex-shrink: 0; width: 32px;
    }
    .mobile-archive .ma-title {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
    }
    .mobile-archive .ma-cat { font-size: 11px; flex-shrink: 0; }

    .main-content { padding-top: 24px; padding-bottom: 80px; }
    .article-header .post-title { font-size: 22px; }
    .article-body img { max-width: 80%; }
    .portal-card { padding: 24px 20px; }
  }
  /* ===== 封面 ===== */
  .cover {
    position: fixed; inset: 0; z-index: 10000;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }
  .cover.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .cover-avatar {
    width: 100px; height: 100px; border-radius: 50%;
    overflow: hidden; margin-bottom: 24px;
    animation: coverFadeIn 0.8s ease;
  }
  .cover-avatar img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .cover-name {
    font-size: 22px; font-weight: 500; color: var(--text);
    letter-spacing: 3px; margin-bottom: 8px;
    animation: coverFadeIn 0.8s ease 0.15s both;
  }
  .cover-bio {
    font-size: 14px; color: var(--text-muted);
    animation: coverFadeIn 0.8s ease 0.3s both;
  }
  .cover-hint {
    position: absolute; bottom: 60px;
    font-size: 13px; color: var(--text-muted);
    animation: coverFadeIn 0.8s ease 0.6s both;
  }
  @keyframes coverFadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

</style>
</head>
<body>

<div class="cover" id="cover">
  <div class="cover-avatar"><div id="cover-avatar-display"></div></div>
  <div class="cover-name" id="cover-name"></div>
  <div class="cover-bio" id="cover-bio"></div>
  <div class="cover-hint">轻触进入</div>
</div>

<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-brand" onclick="router.goHome()">首页</a>
    <div class="navbar-links">
    </div>
  </div>
</nav>

<!-- 手机端顶部栏 -->
<div class="mobile-topbar" id="mobile-topbar">
  <div class="mtb-avatar"><div id="mtb-avatar-display"></div></div>
  <span class="mtb-name" id="mtb-name"></span>
  <button class="mtb-archive-btn" id="mtb-archive-btn" onclick="toggleMobileArchive()">☰</button>
</div>
<div class="mobile-archive" id="mobile-archive"></div>

<div class="page-wrapper">

  <aside class="sidebar" id="sidebar">
    <div class="profile">
      <div class="avatar-wrapper"><div id="avatar-display"></div></div>
      <div class="profile-name" id="profile-name"></div>
      <div class="profile-bio" id="profile-bio"></div>
    </div>
    <ul class="archive-list" id="archive-list"></ul>
  </aside>

  <main class="main-content" id="app"></main>

</div>

<footer>静静记录，无需多言</footer>

<script>
// ==================== 数据加载 ====================
const IMG_MARKER = /\{\{img:([^}]+)\}\}/g;

let postsData = [];
let profileData = { name: '未命名', bio: '写一句简介…', avatar: '' };

async function loadJSON(file) {
  const delays = [500, 1500, 3000, 5000];
  for (let i = 0; i <= delays.length; i++) {
    try {
      const res = await fetch(file);
      if (res.ok) return await res.json();
    } catch(e) { /* 本地打开文件会失败 */ }
    if (i < delays.length) await new Promise(r => setTimeout(r, delays[i]));
  }
  return null;
}

async function loadPosts() {
  const data = await loadJSON('posts.json');
  if (data) {
    postsData = data;
  } else {
    // 回退到 localStorage
    try {
      postsData = JSON.parse(localStorage.getItem('my_blog_posts') || '[]').map(p => ({ category: 'life', ...p }));
    } catch(e) {
      postsData = [];
    }
  }
}

async function loadProfile() {
  const data = await loadJSON('profile.json');
  if (data) {
    profileData = data;
  } else {
    // 回退到 localStorage
    try {
      const local = JSON.parse(localStorage.getItem('my_blog_user') || '{}');
      profileData.name = local.name || '未命名';
      profileData.bio = local.bio || '写一句简介…';
      profileData.avatar = local.avatar || '';
    } catch(e) {}
  }
}

function getPostById(id) {
  return postsData.find(p => p.id === id) || null;
}

function hasImages(content) {
  return IMG_MARKER.test(content);
}

// ==================== 工具函数 ====================
function formatDate(iso) {
  const d = new Date(iso);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}年${m}月${day}日`;
}

function formatDateShort(iso) {
  const d = new Date(iso);
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${m}/${day}`;
}

const IMG_FILE_MARKER = /\{\{img-file:([^}]+)\}\}/g;
const VIDEO_MARKER = /\{\{video:([^}]+)\}\}/g;

function getExcerpt(text, len = 60) {
  const clean = text.replace(IMG_MARKER, '[图片]').replace(IMG_FILE_MARKER, '[图片]').replace(VIDEO_MARKER, '[视频]').replace(/\n/g, ' ').trim();
  return clean.length > len ? clean.slice(0, len) + '…' : clean;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function escapeAttr(str) {
  return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function avatarHTML(avatar, extraAttrs = '') {
  if (!avatar) return '<div class="avatar-placeholder">👤</div>';
  // base64 头像直接渲染
  if (avatar.startsWith('data:')) {
    return `<img src="${escapeAttr(avatar)}" alt="头像" ${extraAttrs}>`;
  }
  // 文件头像用 WebP + JPEG 回退
  const webp = avatar.replace(/\.(jpg|jpeg|png)$/i, '.webp');
  return `<picture><source srcset="${escapeAttr(webp)}" type="image/webp"><img src="${escapeAttr(avatar)}" alt="头像" ${extraAttrs}></picture>`;
}

function formatContent(text) {
  let html = escapeHtml(text);
  // 图片 - 新格式：文件上传 {{img-file:filename.jpg}}
  html = html.replace(/\{\{img-file:([^}]+)\}\}/g, function(match, filename) {
    const name = filename.trim();
    const jpgSrc = 'images/' + escapeAttr(name);
    const webpSrc = 'images/' + escapeAttr(name.replace(/\.(jpg|jpeg|png)$/i, '.webp'));
    return `<picture><source srcset="${webpSrc}" type="image/webp"><img src="${jpgSrc}" alt="图片" loading="lazy" decoding="async"></picture>`;
  });
  // 图片 - 旧格式：base64 {{img:data:image/...}}
  html = html.replace(/\{\{img:(data:image\/[^}]+)\}\}/g, function(match, src) {
    return `<img src="${escapeAttr(decodeURIComponent(src))}" alt="图片" loading="lazy" decoding="async">`;
  });
  // 嵌入地图
  html = html.replace(/\{\{embed-map:([^}]+)\}\}/g, function(match, filename) {
    const src = escapeAttr(filename.trim());
    return `<iframe src="${src}" class="embed-map" loading="lazy"></iframe>`;
  });
  html = html.replace(/\{\{video:([^}]+)\}\}/g, '');
  html = html.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
  return '<p>' + html + '</p>';
}

// ==================== 侧栏渲染 ====================
function renderSidebar() {
  // 头像 (桌面端)
  const avatarContainer = document.getElementById('avatar-display');
  const avatar = profileData.avatar || '';
  if (avatarContainer) {
    avatarContainer.innerHTML = avatarHTML(avatar, 'fetchpriority="high" loading="eager" decoding="sync"');
  }

  // 昵称 & 简介 (桌面端)
  const nameEl = document.getElementById('profile-name');
  const bioEl = document.getElementById('profile-bio');
  if (nameEl) nameEl.textContent = profileData.name || '未命名';
  if (bioEl) bioEl.textContent = profileData.bio || '写一句简介…';

  // 手机端顶部栏
  const mtbAvatar = document.getElementById('mtb-avatar-display');
  if (mtbAvatar) {
    mtbAvatar.innerHTML = avatarHTML(avatar);
  }
  const mtbName = document.getElementById('mtb-name');
  if (mtbName) mtbName.textContent = profileData.name || '未命名';

  // 文章档案 (桌面端)
  const archiveList = document.getElementById('archive-list');
  if (archiveList) {
    if (postsData.length === 0) {
      archiveList.innerHTML = '<li class="archive-empty">暂无文章</li>';
    } else {
      archiveList.innerHTML = postsData.map(p => `
        <li class="archive-item" data-id="${p.id}" onclick="router.navigate('post', '${p.id}')">
          <div class="archive-date">${formatDateShort(p.createdAt)}</div>
          <div class="archive-item-title">${escapeHtml(p.title || '无标题')}</div>
        </li>
      `).join('');
    }
  }

  // 手机端文章下拉
  renderMobileArchive();
}

function renderMobileArchive() {
  const ma = document.getElementById('mobile-archive');
  if (!ma) return;
  if (postsData.length === 0) {
    ma.innerHTML = '<div style="font-size:13px;color:var(--text-muted);padding:8px 0;">暂无文章</div>';
    return;
  }
  const catEmoji = { travel: '🗺', patch: '📌', thought: '💭', reading: '📖', life: '📝' };
  ma.innerHTML = postsData.map(p => `
    <div class="ma-item" onclick="router.navigate('post','${p.id}');closeMobileArchive();">
      <span class="ma-date">${formatDateShort(p.createdAt)}</span>
      <span class="ma-title">${escapeHtml(p.title || '无标题')}</span>
      <span class="ma-cat">${catEmoji[p.category] || '📝'}</span>
    </div>
  `).join('');
}

function toggleMobileArchive() {
  const ma = document.getElementById('mobile-archive');
  if (!ma) return;
  ma.classList.toggle('open');
  const btn = document.getElementById('mtb-archive-btn');
  if (btn) btn.textContent = ma.classList.contains('open') ? '✕' : '☰';
}

function closeMobileArchive() {
  const ma = document.getElementById('mobile-archive');
  if (ma) ma.classList.remove('open');
  const btn = document.getElementById('mtb-archive-btn');
  if (btn) btn.textContent = '☰';
}

function setArchiveActive(id) {
  document.querySelectorAll('.archive-item').forEach(el => el.classList.remove('active'));
  if (id) {
    const active = document.querySelector(`.archive-item[data-id="${id}"]`);
    if (active) active.classList.add('active');
  }
}

// ==================== 视图 ====================
const views = {
  // 首页入口
  portal() {
    const lifeCount = postsData.filter(p => p.category === 'life').length;
    const travelCount = postsData.filter(p => p.category === 'travel').length;
    const readingCount = postsData.filter(p => p.category === 'reading').length;
    const thoughtCount = postsData.filter(p => p.category === 'thought').length;
    return `
      <div class="portal-cards">
        <div class="portal-card" onclick="router.navigate('list', 'life')">
          <div class="card-label">生活</div>
          <div class="card-desc">记录日常点滴${lifeCount > 0 ? '，共 ' + lifeCount + ' 篇' : ''}</div>
        </div>
        <div class="portal-card" onclick="router.navigate('list', 'travel')">
          <div class="card-label">旅行</div>
          <div class="card-desc">旅途见闻与计划${travelCount > 0 ? '，共 ' + travelCount + ' 篇' : ''}</div>
        </div>
        <div class="portal-card" onclick="router.navigate('list', 'reading')">
          <div class="card-label">阅读</div>
          <div class="card-desc">读过的书与笔记${readingCount > 0 ? '，共 ' + readingCount + ' 篇' : ''}</div>
        </div>
        <div class="portal-card" onclick="router.navigate('list', 'thought')">
          <div class="card-label">随想</div>
          <div class="card-desc">一闪而过的念头${thoughtCount > 0 ? '，共 ' + thoughtCount + ' 篇' : ''}</div>
        </div>
      </div>`;
  },

  // 文章列表（可按分类过滤）
  list(category) {
    const filtered = category
      ? postsData.filter(p => p.category === category)
      : postsData;
    const label = category === 'travel' ? '旅行' : category === 'thought' ? '随想' : category === 'reading' ? '阅读' : '生活';

    // 旅行板块的子导航：旅行计划
    const subNav = category === 'travel'
      ? `<a class="sub-nav-card" href="travel.html">
           <span class="sub-nav-icon">📋</span>
           <span class="sub-nav-label">旅行计划</span>
           <span class="sub-nav-arrow">→</span>
         </a>`
      : '';

    if (filtered.length === 0) {
      const emptyMsg = category === 'travel' ? '还没有旅行记录' : category === 'thought' ? '还没有随想' : category === 'reading' ? '还没有阅读记录' : '还没有生活记录';
      return `${subNav}<div class="empty-state"><p>${emptyMsg}</p><p style="font-size:14px;color:#d6d3d1;margin-top:8px;"><a class="back-link" onclick="router.goHome()">← 首页</a></p></div>`;
    }
    const items = filtered.map(p => `
      <li class="post-item" onclick="router.navigate('post', '${p.id}')">
        <div class="post-date">${formatDate(p.createdAt)}</div>
        <div class="post-title">${escapeHtml(p.title || '无标题')}${hasImages(p.content) ? '<span class="has-image">📷</span>' : ''}</div>
        <div class="post-excerpt">${escapeHtml(getExcerpt(p.content))}</div>
      </li>`).join('');
    return `${subNav}<div class="section-header">${label}</div><ul class="post-list">${items}</ul><a class="back-link" onclick="router.goHome()">← 首页</a>`;
  },

  // 文章详情
  post(id) {
    const post = getPostById(id);
    if (!post) {
      return `<div class="empty-state"><p>文章不存在</p><p style="font-size:14px;color:#d6d3d1;"><a class="back-link" onclick="router.navigate('list')">← 返回</a></p></div>`;
    }
    return `
      <article>
        <div class="article-header">
          <div class="post-date">${formatDate(post.createdAt)}</div>
          <h1 class="post-title">${escapeHtml(post.title || '无标题')}</h1>
        </div>
        <div class="article-body">${formatContent(post.content)}</div>
        <a class="back-link" onclick="router.back()">← 返回</a>
      </article>`;
  }
};

// ==================== 路由 ====================
const router = {
  current: null,  // { view, param }
  prev: null,     // { view, param }

  navigate(view, param) {
    const app = document.getElementById('app');
    if (!app) return;

    // 保存当前页面作为返回目标
    if (this.current && view !== this.current.view) {
      this.prev = this.current;
    }

    // 渲染
    if (view === 'portal') app.innerHTML = views.portal();
    else if (view === 'list') app.innerHTML = views.list(param);
    else if (view === 'post') app.innerHTML = views.post(param);
    else app.innerHTML = views.portal();

    this.current = { view, param };
    window.scrollTo(0, 0);
    if (view === 'post') setArchiveActive(param);
    else setArchiveActive(null);
    closeMobileArchive();
  },

  back() {
    if (this.prev) {
      const p = this.prev;
      this.prev = null;
      this.navigate(p.view, p.param);
    } else {
      this.navigate('portal');
    }
  },

  goHome() {
    // 隐藏封面（但不改变 session 状态，只有封面点击才设置）
    document.getElementById('cover').classList.add('hidden');
    this.navigate('portal');
  }
};

// ==================== 图片灯箱 ====================
let lightboxImages = [];
let lightboxIndex = 0;
let lightboxOverlay = null;

function ensureLightbox() {
  if (lightboxOverlay) return;
  lightboxOverlay = document.createElement('div');
  lightboxOverlay.id = 'lightbox-overlay';
  lightboxOverlay.className = 'lightbox-overlay';
  lightboxOverlay.innerHTML = `
    <button class="lightbox-close" title="关闭">✕</button>
    <button class="lightbox-nav lightbox-prev" title="上一张">‹</button>
    <img class="lightbox-img" src="" alt="">
    <button class="lightbox-nav lightbox-next" title="下一张">›</button>
  `;

  // 点击背景或关闭按钮 → 关闭
  lightboxOverlay.addEventListener('click', function(e) {
    if (e.target === lightboxOverlay || e.target.classList.contains('lightbox-close')) {
      closeLightbox();
    }
  });

  // 左右导航按钮
  lightboxOverlay.querySelector('.lightbox-prev').addEventListener('click', function(e) {
    e.stopPropagation();
    navigateLightbox(-1);
  });
  lightboxOverlay.querySelector('.lightbox-next').addEventListener('click', function(e) {
    e.stopPropagation();
    navigateLightbox(1);
  });

  document.body.appendChild(lightboxOverlay);
}

function openLightbox(images, index) {
  ensureLightbox();
  lightboxImages = images;
  lightboxIndex = index;
  showLightboxImage();
  lightboxOverlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightboxOverlay.classList.remove('active');
  document.body.style.overflow = '';
}

function showLightboxImage() {
  const img = lightboxOverlay.querySelector('.lightbox-img');
  img.style.opacity = '0';
  setTimeout(() => {
    img.src = lightboxImages[lightboxIndex];
    img.style.opacity = '1';
  }, 100);
  // 多图时显示导航箭头，单图隐藏
  const showNav = lightboxImages.length > 1 ? '' : 'none';
  lightboxOverlay.querySelector('.lightbox-prev').style.display = showNav;
  lightboxOverlay.querySelector('.lightbox-next').style.display = showNav;
}

function navigateLightbox(dir) {
  lightboxIndex = (lightboxIndex + dir + lightboxImages.length) % lightboxImages.length;
  showLightboxImage();
}

// 事件委托：点击文章中的图片 → 打开灯箱
document.getElementById('app').addEventListener('click', function(e) {
  const img = e.target.closest('.article-body img');
  if (!img) return;
  e.preventDefault();
  const allImages = Array.from(document.querySelectorAll('.article-body img'));
  const index = allImages.indexOf(img);
  const srcs = allImages.map(function(i) { return i.src; });
  openLightbox(srcs, index);
});

// 键盘控制
document.addEventListener('keydown', function(e) {
  if (!lightboxOverlay || !lightboxOverlay.classList.contains('active')) return;
  if (e.key === 'Escape') { e.preventDefault(); closeLightbox(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); navigateLightbox(-1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); navigateLightbox(1); }
});

// ==================== 封面 ====================
function initCover() {
  const cover = document.getElementById('cover');

  // 如果已经进入过主页（同一次会话），刷新时跳过封面
  if (sessionStorage.getItem('cover_entered')) {
    cover.classList.add('hidden');
    return;
  }

  const avatar = profileData.avatar || '';
  document.getElementById('cover-avatar-display').innerHTML = avatarHTML(avatar);
  document.getElementById('cover-name').textContent = profileData.name || '未命名';
  document.getElementById('cover-bio').textContent = profileData.bio || '';

  cover.addEventListener('click', function() {
    this.classList.add('hidden');
    sessionStorage.setItem('cover_entered', '1');
  });
}

// ==================== 启动 ====================
async function init() {
  await Promise.all([loadPosts(), loadProfile()]);
  initCover();
  renderSidebar();
  // 初始加载用 navigate，不触发 goHome（避免影响封面）
  router.navigate('portal');
}

init();
</script>
